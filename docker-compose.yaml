services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fitapp
      POSTGRES_PASSWORD: fitapp_dev
      POSTGRES_DB: fitapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
